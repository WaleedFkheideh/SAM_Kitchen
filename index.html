<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAM Kitchen</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Georgia', serif; background: #FFF8F0; min-height: 100vh; }
  .header { background: #1A1A2E; color: #FFF8F0; text-align: center; border-bottom: 4px solid #E8821A; }
  .header-inner { padding: 20px 16px 14px; }
  .header h1 { font-size: 30px; letter-spacing: 4px; text-transform: uppercase; font-weight: 700; color: #FFF8F0; }
  .header p { font-size: 11px; letter-spacing: 2px; color: #E8821A; text-transform: uppercase; margin-top: 4px; font-family: Arial, sans-serif; }
  .nav-strip { background: #E8821A; display: flex; justify-content: center; }
  .nav-strip span { padding: 8px 20px; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: #1A1A2E; font-family: Arial, sans-serif; font-weight: 700; border-right: 1px solid rgba(0,0,0,0.15); }
  .nav-strip span:last-child { border-right: none; }
  .container { max-width: 820px; margin: 0 auto; padding: 20px 16px; }
  .section-title { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #E8821A; font-family: Arial, sans-serif; font-weight: 700; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #E8821A; }
  .name-bar { background: #fff9f4; border: 1px solid #e0d0c0; border-radius: 4px; padding: 14px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .name-bar label { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: #888; font-family: Arial, sans-serif; white-space: nowrap; }
  .name-bar input { flex: 1; min-width: 140px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 3px; font-size: 15px; font-family: inherit; background: white; color: #1A1A2E; outline: none; }
  .name-bar input:focus { border-color: #E8821A; }
  .order-form { background: white; border: 1px solid #e0d0c0; border-radius: 4px; padding: 20px; margin-bottom: 24px; position: relative; }
  .order-form::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: #E8821A; border-radius: 4px 4px 0 0; }
  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: #888; font-family: Arial, sans-serif; margin-bottom: 6px; }
  .form-row input, .form-row textarea { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 3px; font-size: 15px; font-family: inherit; background: #FAFAF8; color: #1A1A2E; outline: none; transition: border-color 0.2s; }
  .form-row input:focus, .form-row textarea:focus { border-color: #E8821A; background: white; }
  .form-row textarea { resize: vertical; min-height: 80px; }
  .btn { padding: 11px 26px; border: none; border-radius: 3px; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; font-family: Arial, sans-serif; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: #E8821A; color: white; }
  .btn-primary:hover { background: #cf7016; }
  .btn-danger { background: #1A1A2E; color: white; }
  .btn-danger:hover { background: #2d2d4e; }
  .btn-sm { padding: 6px 14px; font-size: 11px; }
  .btn-outline { padding: 6px 14px; border: 1px solid #ddd; background: white; border-radius: 3px; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; font-family: Arial, sans-serif; font-weight: 700; cursor: pointer; color: #666; }
  .btn-outline:hover { border-color: #E8821A; color: #E8821A; }
  .name-tag { background: #1A1A2E; color: #E8821A; font-family: Arial, sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1px; padding: 5px 14px; border-radius: 3px; text-transform: uppercase; display: inline-block; }
  .orders-board { background: white; border: 1px solid #e0d0c0; border-radius: 4px; overflow: hidden; }
  .orders-header { background: #1A1A2E; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; }
  .orders-header h3 { color: #FFF8F0; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; font-family: Arial, sans-serif; }
  .order-count { background: #E8821A; color: white; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; font-family: Arial, sans-serif; }
  .group-ticket { border-bottom: 1px dashed #e0d0c0; padding: 16px 20px; }
  .group-ticket:last-child { border-bottom: none; }
  .group-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .group-order-text { font-size: 15px; font-weight: 700; color: #1A1A2E; font-family: Arial, sans-serif; flex: 1; line-height: 1.4; }
  .qty-badge { background: #E8821A; color: white; font-family: Arial, sans-serif; font-size: 13px; font-weight: 700; padding: 4px 12px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .names-row { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .name-chip { background: #f0f0f0; color: #444; font-family: Arial, sans-serif; font-size: 12px; padding: 3px 10px; border-radius: 20px; display: flex; align-items: center; gap: 5px; }
  .name-chip.own { background: #fff3e0; color: #E8821A; border: 1px solid #E8821A; }
  .chip-del { cursor: pointer; font-size: 13px; color: #aaa; line-height: 1; padding: 0 2px; }
  .chip-del:hover { color: #c0392b; }
  .join-btn { background: #E8821A; border: none; color: white; font-family: Arial, sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; padding: 5px 14px; border-radius: 20px; cursor: pointer; text-transform: uppercase; }
  .join-btn:hover { background: #cf7016; }
  .join-btn:active { transform: scale(0.97); }
  .empty-state { padding: 40px 20px; text-align: center; color: #bbb; font-family: Arial, sans-serif; font-size: 13px; letter-spacing: 1px; }
  .refresh-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .last-updated { font-size: 11px; color: #aaa; font-family: Arial, sans-serif; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1A1A2E; color: white; padding: 12px 24px; border-radius: 4px; font-family: Arial, sans-serif; font-size: 13px; border-left: 4px solid #E8821A; transition: transform 0.3s ease; z-index: 999; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .connecting { text-align:center; padding: 30px; color: #aaa; font-family: Arial, sans-serif; font-size: 13px; }
  @media (max-width: 480px) {
    .header h1 { font-size: 22px; }
    .group-top { flex-direction: column; }
    .qty-badge { align-self: flex-start; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>SAM Kitchen</h1>
    <p>Daily Team Lunch Orders</p>
  </div>
  <div class="nav-strip">
    <span>Order</span><span>Join</span><span>Track</span><span>Eat</span>
  </div>
</div>

<div class="container">

  <div class="name-bar" id="nameBar">
    <label>Your name:</label>
    <input type="text" id="yourNameInput" placeholder="Enter your name to get started..." maxlength="40" onkeydown="if(event.key==='Enter')setName()" />
    <button class="btn btn-primary btn-sm" onclick="setName()">Set Name</button>
  </div>

  <div id="orderFormSection" style="display:none">
    <p class="section-title">Place Your Order</p>
    <div class="order-form">
      <div class="form-row">
        <label>Ordering as</label>
        <span class="name-tag" id="displayName">—</span>
        <button class="btn-outline" style="font-size:10px;padding:4px 10px;margin-left:10px;" onclick="changeName()">Change</button>
      </div>
      <div class="form-row">
        <label>What would you like?</label>
        <textarea id="orderInput" placeholder="e.g. Grilled chicken sandwich, no onions + fries + Diet Coke" rows="3"></textarea>
      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="submitOrder()">Add to Board</button>
        <span style="font-size:12px;color:#aaa;font-family:Arial,sans-serif;">Same as someone? Hit <strong>+Join</strong> on their ticket.</span>
      </div>
    </div>
  </div>

  <div class="refresh-row">
    <p class="section-title" style="margin-bottom:0">Today's Order Board</p>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <span class="last-updated" id="lastUpdated"></span>
      <button class="btn btn-sm btn-danger" onclick="clearAll()">Clear All</button>
    </div>
  </div>

  <div class="orders-board">
    <div class="orders-header">
      <h3>Order Board</h3>
      <span class="order-count" id="orderCount">0 items</span>
    </div>
    <div id="ordersList">
      <div class="connecting">Connecting to Firebase...</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, remove, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const app = initializeApp({
    databaseURL: "https://sam-kitchen-31c81-default-rtdb.europe-west1.firebasedatabase.app"
  });
  const db = getDatabase(app);
  const ordersRef = ref(db, 'orders');

  // currentUser lives on window so renderOrders always reads the latest value
  window.currentUser = localStorage.getItem('samKitchenUser') || '';

  // Keep a snapshot of the last orders array so re-renders after name-set are instant
  let lastOrders = [];

  // ── Helpers ──────────────────────────────────────────────────────────────────

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function normalize(s) { return s.trim().toLowerCase().replace(/\s+/g,' '); }

  function groupOrders(orders) {
    const groups = [];
    orders.forEach(o => {
      const norm = normalize(o.order);
      const existing = groups.find(g => normalize(g.orderText) === norm);
      if (existing) {
        if (!existing.names.find(n => n.name === o.name)) {
          existing.names.push({ name: o.name, firebaseKey: o.firebaseKey });
        }
      } else {
        groups.push({ orderText: o.order, firstTs: o.ts, names: [{ name: o.name, firebaseKey: o.firebaseKey }] });
      }
    });
    groups.sort((a,b) => a.firstTs - b.firstTs);
    return groups;
  }

  // ── Render ───────────────────────────────────────────────────────────────────
  // Reads window.currentUser at call time — always fresh after setName()

  function renderOrders(orders) {
    lastOrders = orders;
    const user = window.currentUser;   // <-- live read every render
    const list = document.getElementById('ordersList');
    const countEl = document.getElementById('orderCount');

    if (!orders || orders.length === 0) {
      countEl.textContent = '0 items';
      list.innerHTML = '<div class="empty-state">🍴 No orders yet — be the first!</div>';
      return;
    }

    const groups = groupOrders(orders);
    countEl.textContent = groups.length + ' dish' + (groups.length !== 1 ? 'es' : '') + ' · ' + orders.length + ' total';

    list.innerHTML = groups.map(g => {
      const myEntry = g.names.find(n => n.name === user);

      const chips = g.names.map(n => {
        const isOwn = (n.name === user);
        return `<span class="name-chip ${isOwn ? 'own' : ''}">
          ${esc(n.name)}
          ${isOwn ? `<span class="chip-del" data-key="${esc(n.firebaseKey)}" title="Remove">✕</span>` : ''}
        </span>`;
      }).join('');

      // Show join button only when a name is set AND user not already in this group
      const joinBtn = (user && !myEntry)
        ? `<button class="join-btn" data-order="${esc(g.orderText)}">+ Join</button>`
        : '';

      return `
        <div class="group-ticket">
          <div class="group-top">
            <div class="group-order-text">${esc(g.orderText)}</div>
            <span class="qty-badge">× ${g.names.length}</span>
          </div>
          <div class="names-row">${chips}${joinBtn}</div>
        </div>`;
    }).join('');

    // Attach events after render
    list.querySelectorAll('.join-btn').forEach(btn => {
      btn.addEventListener('click', () => joinOrder(btn.dataset.order));
    });
    list.querySelectorAll('.chip-del').forEach(span => {
      span.addEventListener('click', () => removeMyEntry(span.dataset.key));
    });

    document.getElementById('lastUpdated').textContent =
      'Live · ' + new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  }

  // ── Name setup ───────────────────────────────────────────────────────────────

  window.setName = function() {
    const val = document.getElementById('yourNameInput').value.trim();
    if (!val) { showToast('Please enter your name first'); return; }
    window.currentUser = val;
    localStorage.setItem('samKitchenUser', val);
    document.getElementById('nameBar').style.display = 'none';
    document.getElementById('orderFormSection').style.display = 'block';
    document.getElementById('displayName').textContent = val.toUpperCase();
    // Re-render immediately so join buttons appear without waiting for next Firebase event
    renderOrders(lastOrders);
  };

  window.changeName = function() {
    window.currentUser = '';
    localStorage.removeItem('samKitchenUser');
    document.getElementById('yourNameInput').value = '';
    document.getElementById('nameBar').style.display = 'flex';
    document.getElementById('orderFormSection').style.display = 'none';
    renderOrders(lastOrders);
  };

  // ── Firebase actions ─────────────────────────────────────────────────────────

  window.submitOrder = async function() {
    const text = document.getElementById('orderInput').value.trim();
    if (!text) { showToast('Please write your order first'); return; }
    if (!window.currentUser) { showToast('Set your name first'); return; }

    const snap = await get(ordersRef);
    const existing = snap.exists() ? Object.values(snap.val()) : [];
    const norm = normalize(text);
    if (existing.find(o => normalize(o.order) === norm && o.name === window.currentUser)) {
      showToast('You already have this exact order!'); return;
    }

    await push(ordersRef, { name: window.currentUser, order: text, ts: Date.now() });
    document.getElementById('orderInput').value = '';
    showToast('✓ Order added!');
  };

  async function joinOrder(orderText) {
    if (!window.currentUser) { showToast('Set your name first'); return; }

    const snap = await get(ordersRef);
    const existing = snap.exists() ? Object.values(snap.val()) : [];
    const norm = normalize(orderText);

    if (existing.find(o => normalize(o.order) === norm && o.name === window.currentUser)) {
      showToast('You already have this order!'); return;
    }

    const canonical = existing.find(o => normalize(o.order) === norm);
    const textToSave = canonical ? canonical.order : orderText;

    await push(ordersRef, { name: window.currentUser, order: textToSave, ts: Date.now() });
    showToast('✓ Joined: ' + textToSave.substring(0,35));
  }

  async function removeMyEntry(firebaseKey) {
    if (!firebaseKey) return;
    const entryRef = ref(db, 'orders/' + firebaseKey);
    const snap = await get(entryRef);
    if (!snap.exists()) { showToast('Entry not found'); return; }
    if (snap.val().name !== window.currentUser) { showToast('You can only remove your own order'); return; }
    await remove(entryRef);
    showToast('Removed from order');
  }

  window.clearAll = async function() {
    if (!confirm('Clear ALL orders? This cannot be undone.')) return;
    await remove(ordersRef);
    showToast('Board cleared');
  };

  // ── Real-time listener ───────────────────────────────────────────────────────

  onValue(ordersRef, (snap) => {
    if (!snap.exists()) { renderOrders([]); return; }
    const orders = Object.entries(snap.val()).map(([key, val]) => ({
      firebaseKey: key, name: val.name, order: val.order, ts: val.ts
    }));
    orders.sort((a,b) => a.ts - b.ts);
    renderOrders(orders);
  });

  // ── Init ─────────────────────────────────────────────────────────────────────

  if (window.currentUser) {
    document.getElementById('yourNameInput').value = window.currentUser;
    document.getElementById('nameBar').style.display = 'none';
    document.getElementById('orderFormSection').style.display = 'block';
    document.getElementById('displayName').textContent = window.currentUser.toUpperCase();
  }
</script>
</body>
</html>
