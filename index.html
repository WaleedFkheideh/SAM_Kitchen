<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAM Kitchen</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Georgia', serif; background: #FFF8F0; min-height: 100vh; }

  /* ── Header ── */
  .header { background: #1A1A2E; text-align: center; border-bottom: 4px solid #E8821A; }
  .header-inner { padding: 22px 16px 14px; }
  .header h1 { font-size: 32px; letter-spacing: 5px; text-transform: uppercase; font-weight: 700; color: #FFF8F0; }
  .header p { font-size: 11px; letter-spacing: 2px; color: #E8821A; text-transform: uppercase; margin-top: 5px; font-family: Arial, sans-serif; }
  .nav-strip { background: #E8821A; display: flex; justify-content: center; }
  .nav-strip span { padding: 8px 24px; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: #1A1A2E; font-family: Arial, sans-serif; font-weight: 700; border-right: 1px solid rgba(0,0,0,0.15); }
  .nav-strip span:last-child { border-right: none; }

  /* ── Page sections ── */
  .container { max-width: 900px; margin: 0 auto; padding: 0 16px 40px; }

  /* ── SECTION 1: Menu ── */
  .menu-section {
    background: #1A1A2E;
    padding: 28px 32px;
    border-bottom: 3px solid #E8821A;
  }
  .menu-section-inner { max-width: 900px; margin: 0 auto; }
  .menu-section-title {
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: #E8821A; font-family: Arial, sans-serif; font-weight: 700;
    margin-bottom: 16px; padding-bottom: 10px;
    border-bottom: 1px solid rgba(232,130,26,0.3);
  }
  .menu-add-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 20px; }
  .menu-add-row .field { display: flex; flex-direction: column; gap: 5px; }
  .menu-add-row label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: #aaa; font-family: Arial, sans-serif; }
  .menu-add-row input {
    padding: 9px 12px; border: 1px solid #333; border-radius: 3px;
    font-size: 14px; font-family: inherit; background: #252540; color: #FFF8F0; outline: none;
    transition: border-color 0.2s;
  }
  .menu-add-row input:focus { border-color: #E8821A; }
  .menu-add-row input.emoji-input { width: 64px; text-align: center; font-size: 20px; }
  .btn-add-menu {
    padding: 10px 20px; background: #E8821A; color: white; border: none; border-radius: 3px;
    font-size: 12px; letter-spacing: 1px; text-transform: uppercase; font-family: Arial, sans-serif;
    font-weight: 700; cursor: pointer; white-space: nowrap;
  }
  .btn-add-menu:hover { background: #cf7016; }

  /* Scrollable horizontal menu chips */
  .menu-chips-row {
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .menu-chip {
    display: flex; align-items: center; gap: 8px;
    background: #252540; border: 1px solid #333; border-radius: 30px;
    padding: 7px 14px 7px 10px; cursor: default;
  }
  .menu-chip .mc-emoji { font-size: 20px; }
  .menu-chip .mc-name { font-family: Arial, sans-serif; font-size: 13px; font-weight: 700; color: #FFF8F0; }
  .menu-chip .mc-del { cursor: pointer; color: #555; font-size: 14px; line-height: 1; margin-left: 4px; }
  .menu-chip .mc-del:hover { color: #E8821A; }
  .menu-empty { font-family: Arial, sans-serif; font-size: 13px; color: #555; font-style: italic; }

  /* ── SECTION 2: Place Order ── */
  .order-section { padding: 28px 0; border-bottom: 2px dashed #e0d0c0; }
  .order-section-title {
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: #E8821A; font-family: Arial, sans-serif; font-weight: 700;
    margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #e0d0c0;
  }
  .order-card {
    background: white; border: 1px solid #e0d0c0; border-radius: 6px;
    overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .order-card-top {
    background: #fff9f4; padding: 16px 24px;
    border-bottom: 1px solid #e0d0c0;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .order-card-top label { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: #888; font-family: Arial, sans-serif; white-space: nowrap; }
  .order-card-top input {
    flex: 1; min-width: 160px; padding: 9px 14px; border: 1px solid #ddd; border-radius: 3px;
    font-size: 15px; font-family: inherit; background: white; color: #1A1A2E; outline: none;
  }
  .order-card-top input:focus { border-color: #E8821A; }
  .name-tag { background: #1A1A2E; color: #E8821A; font-family: Arial, sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1px; padding: 6px 16px; border-radius: 3px; text-transform: uppercase; display: inline-block; }
  .btn-outline { padding: 6px 14px; border: 1px solid #ddd; background: white; border-radius: 3px; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; font-family: Arial, sans-serif; font-weight: 700; cursor: pointer; color: #666; }
  .btn-outline:hover { border-color: #E8821A; color: #E8821A; }

  .order-card-body { padding: 20px 24px; }

  /* Food picker grid */
  .pick-label { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: #888; font-family: Arial, sans-serif; margin-bottom: 10px; display: block; }
  .food-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
  .food-tile {
    border: 2px solid #e0d0c0; border-radius: 8px; padding: 12px 16px;
    text-align: center; cursor: pointer; transition: all 0.15s; background: #fafaf8;
    min-width: 90px; display: flex; flex-direction: column; align-items: center; gap: 5px;
  }
  .food-tile:hover { border-color: #E8821A; background: #fff9f4; transform: translateY(-1px); }
  .food-tile.selected { border-color: #E8821A; background: #fff3e0; box-shadow: 0 0 0 3px #E8821A22; }
  .food-tile .tile-emoji { font-size: 28px; }
  .food-tile .tile-name { font-size: 12px; font-family: Arial, sans-serif; font-weight: 700; color: #1A1A2E; line-height: 1.2; }
  .food-tile.selected .tile-name { color: #E8821A; }
  .no-menu-msg { font-family: Arial, sans-serif; font-size: 13px; color: #bbb; padding: 14px 0; font-style: italic; }

  .notes-row { display: flex; gap: 12px; align-items: flex-start; flex-wrap: wrap; }
  .notes-row textarea {
    flex: 1; min-width: 200px; padding: 10px 14px; border: 1px solid #ddd; border-radius: 3px;
    font-size: 14px; font-family: inherit; background: #FAFAF8; color: #1A1A2E; outline: none;
    resize: vertical; min-height: 44px; transition: border-color 0.2s;
  }
  .notes-row textarea:focus { border-color: #E8821A; background: white; }
  .btn-submit {
    padding: 12px 28px; background: #E8821A; color: white; border: none; border-radius: 3px;
    font-size: 13px; letter-spacing: 1px; text-transform: uppercase; font-family: Arial, sans-serif;
    font-weight: 700; cursor: pointer; white-space: nowrap; align-self: flex-end;
  }
  .btn-submit:hover { background: #cf7016; }
  .btn-submit:active { transform: scale(0.98); }

  /* ── SECTION 3: Order Board ── */
  .board-section { padding-top: 28px; }
  .board-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .board-section-title { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #E8821A; font-family: Arial, sans-serif; font-weight: 700; padding-bottom: 10px; border-bottom: 1px solid #e0d0c0; flex: 1; }
  .btn-clear { padding: 6px 16px; background: #1A1A2E; color: white; border: none; border-radius: 3px; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; font-family: Arial, sans-serif; font-weight: 700; cursor: pointer; }
  .btn-clear:hover { background: #2d2d4e; }

  .orders-board { background: white; border: 1px solid #e0d0c0; border-radius: 6px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .orders-header { background: #1A1A2E; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .orders-header h3 { color: #FFF8F0; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; font-family: Arial, sans-serif; }
  .order-count { background: #E8821A; color: white; font-size: 11px; font-weight: 700; padding: 3px 12px; border-radius: 20px; font-family: Arial, sans-serif; }

  .group-ticket { border-bottom: 1px dashed #e0d0c0; padding: 16px 24px; }
  .group-ticket:last-child { border-bottom: none; }
  .group-top { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .group-order-text { font-size: 17px; font-weight: 700; color: #1A1A2E; font-family: Arial, sans-serif; display: flex; align-items: center; gap: 10px; }
  .group-emoji { font-size: 26px; }
  .qty-badge { background: #E8821A; color: white; font-family: Arial, sans-serif; font-size: 13px; font-weight: 700; padding: 4px 14px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .names-row { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .name-chip { background: #f0f0f0; color: #444; font-family: Arial, sans-serif; font-size: 12px; padding: 4px 12px; border-radius: 20px; display: flex; align-items: center; gap: 6px; }
  .name-chip.own { background: #fff3e0; color: #E8821A; border: 1px solid #E8821A; }
  .chip-note { opacity: 0.65; font-style: italic; font-size: 11px; }
  .chip-del { cursor: pointer; font-size: 13px; color: #bbb; line-height: 1; }
  .chip-del:hover { color: #c0392b; }
  .join-btn { background: #E8821A; border: none; color: white; font-family: Arial, sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; padding: 5px 14px; border-radius: 20px; cursor: pointer; text-transform: uppercase; }
  .join-btn:hover { background: #cf7016; }
  .join-btn:active { transform: scale(0.97); }

  .empty-state { padding: 48px 20px; text-align: center; color: #ccc; font-family: Arial, sans-serif; font-size: 13px; letter-spacing: 1px; }
  .empty-state .eicon { font-size: 36px; margin-bottom: 10px; }
  .last-updated { font-size: 11px; color: #aaa; font-family: Arial, sans-serif; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1A1A2E; color: white; padding: 12px 24px; border-radius: 4px; font-family: Arial, sans-serif; font-size: 13px; border-left: 4px solid #E8821A; transition: transform 0.3s ease; z-index: 999; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media(max-width:560px){
    .header h1 { font-size: 24px; }
    .menu-section { padding: 20px 16px; }
    .order-card-top { padding: 14px 16px; }
    .order-card-body { padding: 16px; }
    .group-ticket { padding: 14px 16px; }
    .orders-header { padding: 12px 16px; }
    .board-header-row { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<!-- ══ HEADER ══════════════════════════════════════════════════════════════ -->
<div class="header">
  <div class="header-inner">
    <h1>SAM Kitchen</h1>
    <p>Daily Team Lunch Orders</p>
  </div>
  <div class="nav-strip">
    <span>Menu</span><span>Order</span><span>Join</span><span>Eat</span>
  </div>
</div>

<!-- ══ SECTION 1: MENU (dark band, full width) ═════════════════════════════ -->
<div class="menu-section">
  <div class="menu-section-inner">
    <p class="menu-section-title">Today's Menu — Add Food Items</p>
    <div class="menu-add-row">
      <div class="field">
        <label>Emoji</label>
        <input class="emoji-input" type="text" id="menuEmoji" placeholder="🍕" maxlength="4" />
      </div>
      <div class="field" style="flex:1;min-width:180px;">
        <label>Food name</label>
        <input type="text" id="menuName" placeholder="e.g. Grilled Chicken" maxlength="60"
          onkeydown="if(event.key==='Enter')addMenuItem()" />
      </div>
      <button class="btn-add-menu" onclick="addMenuItem()">+ Add Item</button>
    </div>
    <div class="menu-chips-row" id="menuChips">
      <span class="menu-empty">No menu items yet — add the first one above</span>
    </div>
  </div>
</div>

<!-- ══ SECTIONS 2 & 3: container ══════════════════════════════════════════ -->
<div class="container">

  <!-- SECTION 2: Place Your Order -->
  <div class="order-section">
    <p class="order-section-title">Place Your Order</p>
    <div class="order-card">

      <!-- Name row -->
      <div class="order-card-top">
        <label>Your name:</label>
        <div id="nameInputWrap" style="display:flex;gap:8px;align-items:center;flex:1;flex-wrap:wrap;">
          <input type="text" id="yourNameInput" placeholder="Type your name and press Enter..."
            maxlength="40" onkeydown="if(event.key==='Enter')setName()" style="flex:1;" />
          <button class="btn-submit" style="padding:9px 18px;font-size:11px;" onclick="setName()">Set</button>
        </div>
        <div id="nameSetWrap" style="display:none;align-items:center;gap:10px;">
          <span class="name-tag" id="displayName">—</span>
          <button class="btn-outline" onclick="changeName()">Change</button>
        </div>
      </div>

      <!-- Food picker + notes + submit -->
      <div class="order-card-body">
        <span class="pick-label">Pick your meal</span>
        <div class="food-grid" id="foodGrid">
          <div class="no-menu-msg">Add items to the menu above first</div>
        </div>
        <div class="notes-row">
          <textarea id="orderNotes" placeholder="Notes (optional) — e.g. No onions, extra sauce..."></textarea>
          <button class="btn-submit" onclick="submitOrder()">Add to Board</button>
        </div>
      </div>

    </div>
  </div>

  <!-- SECTION 3: Order Board -->
  <div class="board-section">
    <div class="board-header-row">
      <p class="board-section-title">Today's Order Board</p>
      <div style="display:flex;gap:10px;align-items:center;">
        <span class="last-updated" id="lastUpdated"></span>
        <button class="btn-clear" onclick="clearOrders()">Clear All</button>
      </div>
    </div>

    <div class="orders-board">
      <div class="orders-header">
        <h3>Order Board</h3>
        <span class="order-count" id="orderCount">0 items</span>
      </div>
      <div id="ordersList">
        <div class="empty-state"><div class="eicon">🍴</div>No orders yet — be the first!</div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, remove, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const app = initializeApp({
    databaseURL: "https://sam-kitchen-31c81-default-rtdb.europe-west1.firebasedatabase.app"
  });
  const db        = getDatabase(app);
  const ordersRef = ref(db, 'orders');
  const menuRef   = ref(db, 'menu');

  window.currentUser = localStorage.getItem('samKitchenUser') || '';
  let lastOrders     = [];
  let lastMenu       = [];
  let selectedFood   = null;

  // ── Helpers ──────────────────────────────────────────────────────────────────

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ── Name ─────────────────────────────────────────────────────────────────────

  window.setName = function() {
    const val = document.getElementById('yourNameInput').value.trim();
    if (!val) { showToast('Please enter your name'); return; }
    window.currentUser = val;
    localStorage.setItem('samKitchenUser', val);
    document.getElementById('nameInputWrap').style.display = 'none';
    document.getElementById('nameSetWrap').style.display   = 'flex';
    document.getElementById('displayName').textContent     = val.toUpperCase();
    renderMenu(lastMenu);
    renderOrders(lastOrders);
  };

  window.changeName = function() {
    window.currentUser = '';
    localStorage.removeItem('samKitchenUser');
    document.getElementById('yourNameInput').value = '';
    document.getElementById('nameInputWrap').style.display = 'flex';
    document.getElementById('nameSetWrap').style.display   = 'none';
    renderOrders(lastOrders);
  };

  // ── Menu ─────────────────────────────────────────────────────────────────────

  window.addMenuItem = async function() {
    const emoji = document.getElementById('menuEmoji').value.trim() || '🍽';
    const name  = document.getElementById('menuName').value.trim();
    if (!name) { showToast('Enter a food name'); return; }
    if (lastMenu.find(m => m.name.toLowerCase() === name.toLowerCase())) {
      showToast('Already on the menu!'); return;
    }
    await push(menuRef, { emoji, name });
    document.getElementById('menuEmoji').value = '';
    document.getElementById('menuName').value  = '';
    showToast('✓ Added: ' + name);
  };

  window.deleteMenuItem = async function(key) {
    await remove(ref(db, 'menu/' + key));
    if (selectedFood && selectedFood.key === key) selectedFood = null;
    showToast('Removed from menu');
  };

  function renderMenu(menu) {
    lastMenu = menu;

    // Dark band chips
    const chipsEl = document.getElementById('menuChips');
    if (!menu.length) {
      chipsEl.innerHTML = '<span class="menu-empty">No menu items yet — add the first one above</span>';
    } else {
      chipsEl.innerHTML = menu.map(m => `
        <div class="menu-chip">
          <span class="mc-emoji">${esc(m.emoji)}</span>
          <span class="mc-name">${esc(m.name)}</span>
          <span class="mc-del" data-key="${esc(m.key)}" title="Remove">✕</span>
        </div>`).join('');
      chipsEl.querySelectorAll('.mc-del').forEach(el =>
        el.addEventListener('click', () => deleteMenuItem(el.dataset.key))
      );
    }

    // Food picker grid
    const grid = document.getElementById('foodGrid');
    if (!menu.length) {
      grid.innerHTML = '<div class="no-menu-msg">Add items to the menu above first</div>';
      return;
    }
    grid.innerHTML = menu.map(m => {
      const isSel = selectedFood && selectedFood.key === m.key;
      return `<div class="food-tile ${isSel ? 'selected' : ''}" data-key="${esc(m.key)}">
        <span class="tile-emoji">${esc(m.emoji)}</span>
        <span class="tile-name">${esc(m.name)}</span>
      </div>`;
    }).join('');
    grid.querySelectorAll('.food-tile').forEach(tile => {
      tile.addEventListener('click', () => {
        selectedFood = menu.find(m => m.key === tile.dataset.key) || null;
        grid.querySelectorAll('.food-tile').forEach(t => t.classList.remove('selected'));
        tile.classList.add('selected');
      });
    });
  }

  // ── Orders ───────────────────────────────────────────────────────────────────

  function groupOrders(orders) {
    const groups = [];
    orders.forEach(o => {
      const existing = groups.find(g => g.foodKey === o.foodKey);
      if (existing) {
        if (!existing.names.find(n => n.name === o.name)) {
          existing.names.push({ name: o.name, firebaseKey: o.firebaseKey, note: o.notes || '' });
        }
      } else {
        groups.push({
          foodKey: o.foodKey, foodName: o.foodName, foodEmoji: o.foodEmoji,
          firstTs: o.ts,
          names: [{ name: o.name, firebaseKey: o.firebaseKey, note: o.notes || '' }]
        });
      }
    });
    groups.sort((a,b) => a.firstTs - b.firstTs);
    return groups;
  }

  function renderOrders(orders) {
    lastOrders = orders;
    const user    = window.currentUser;
    const list    = document.getElementById('ordersList');
    const countEl = document.getElementById('orderCount');

    if (!orders.length) {
      countEl.textContent = '0 items';
      list.innerHTML = '<div class="empty-state"><div class="eicon">🍴</div>No orders yet — be the first!</div>';
      return;
    }

    const groups = groupOrders(orders);
    countEl.textContent = groups.length + ' dish' + (groups.length !== 1 ? 'es' : '') + ' · ' + orders.length + ' total';

    list.innerHTML = groups.map(g => {
      const myEntry = g.names.find(n => n.name === user);

      const chips = g.names.map(n => {
        const isOwn = n.name === user;
        return `<span class="name-chip ${isOwn ? 'own' : ''}">
          ${esc(n.name)}
          ${n.note ? `<span class="chip-note">(${esc(n.note)})</span>` : ''}
          ${isOwn ? `<span class="chip-del" data-key="${esc(n.firebaseKey)}" title="Remove">✕</span>` : ''}
        </span>`;
      }).join('');

      const joinBtn = (user && !myEntry)
        ? `<button class="join-btn" data-foodkey="${esc(g.foodKey)}">+ Join</button>`
        : '';

      return `
        <div class="group-ticket">
          <div class="group-top">
            <div class="group-order-text">
              <span class="group-emoji">${esc(g.foodEmoji)}</span>${esc(g.foodName)}
            </div>
            <span class="qty-badge">× ${g.names.length}</span>
          </div>
          <div class="names-row">${chips}${joinBtn}</div>
        </div>`;
    }).join('');

    list.querySelectorAll('.join-btn').forEach(btn =>
      btn.addEventListener('click', () => joinOrder(btn.dataset.foodkey))
    );
    list.querySelectorAll('.chip-del').forEach(span =>
      span.addEventListener('click', () => removeMyEntry(span.dataset.key))
    );

    document.getElementById('lastUpdated').textContent =
      'Live · ' + new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  }

  window.submitOrder = async function() {
    if (!window.currentUser) { showToast('Enter your name first'); return; }
    if (!selectedFood)        { showToast('Pick a meal first'); return; }

    const notes = document.getElementById('orderNotes').value.trim();
    const snap  = await get(ordersRef);
    const existing = snap.exists() ? Object.values(snap.val()) : [];

    if (existing.find(o => o.foodKey === selectedFood.key && o.name === window.currentUser)) {
      showToast('You already ordered ' + selectedFood.name + '!'); return;
    }

    await push(ordersRef, {
      name: window.currentUser, foodKey: selectedFood.key,
      foodName: selectedFood.name, foodEmoji: selectedFood.emoji,
      notes, ts: Date.now()
    });
    document.getElementById('orderNotes').value = '';
    showToast('✓ Order added: ' + selectedFood.emoji + ' ' + selectedFood.name);
  };

  async function joinOrder(foodKey) {
    if (!window.currentUser) { showToast('Enter your name first'); return; }
    const snap = await get(ordersRef);
    const existing = snap.exists() ? Object.values(snap.val()) : [];
    if (existing.find(o => o.foodKey === foodKey && o.name === window.currentUser)) {
      showToast('You already have this order!'); return;
    }
    const menuItem = lastMenu.find(m => m.key === foodKey);
    if (!menuItem) { showToast('Menu item not found'); return; }
    await push(ordersRef, {
      name: window.currentUser, foodKey: menuItem.key,
      foodName: menuItem.name, foodEmoji: menuItem.emoji,
      notes: '', ts: Date.now()
    });
    showToast('✓ Joined: ' + menuItem.emoji + ' ' + menuItem.name);
  }

  async function removeMyEntry(firebaseKey) {
    const entryRef = ref(db, 'orders/' + firebaseKey);
    const snap = await get(entryRef);
    if (!snap.exists()) { showToast('Not found'); return; }
    if (snap.val().name !== window.currentUser) { showToast('You can only remove your own order'); return; }
    await remove(entryRef);
    showToast('Removed');
  }

  window.clearOrders = async function() {
    if (!confirm('Clear ALL orders? Menu items will stay. Cannot be undone.')) return;
    await remove(ordersRef);
    showToast('Orders cleared');
  };

  // ── Real-time listeners ───────────────────────────────────────────────────────

  onValue(menuRef, snap => {
    const menu = snap.exists()
      ? Object.entries(snap.val()).map(([key,val]) => ({ key, emoji: val.emoji, name: val.name }))
      : [];
    renderMenu(menu);
  });

  onValue(ordersRef, snap => {
    const orders = snap.exists()
      ? Object.entries(snap.val()).map(([key,val]) => ({ firebaseKey: key, ...val }))
          .sort((a,b) => a.ts - b.ts)
      : [];
    renderOrders(orders);
  });

  // ── Init ─────────────────────────────────────────────────────────────────────

  if (window.currentUser) {
    document.getElementById('yourNameInput').value = window.currentUser;
    document.getElementById('nameInputWrap').style.display = 'none';
    document.getElementById('nameSetWrap').style.display   = 'flex';
    document.getElementById('displayName').textContent     = window.currentUser.toUpperCase();
  }
</script>
</body>
</html>
